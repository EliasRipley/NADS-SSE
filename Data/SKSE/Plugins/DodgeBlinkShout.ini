[DodgeBlink]
; Stable v1: character-controller dash backend.
; No SetPosition teleport path is used.

; Distances used by DoBlinkTier 1/2/3 (native shout tiers).
Dist1=175.0
Dist2=275.0
Dist3=375.0

; Base cooldowns in seconds per tier (spell/hotkey paths).
; Takeover mode bypasses CD1/2/3 so takeover cadence is dash-gate + stamina.
CD1=1.25
CD2=2.50
CD3=4.00

; Gate timing used to avoid overlapping casts.
DashTime1=0.30
DashTime2=0.38
DashTime3=0.46

; Tier resolution is source-driven:
; - Spell mode: each spell record decides tier (T1/T2/T3)
; - Shout mode: held shout word decides tier (word 1/2/3)
; - Hotkey mode: HotkeyTier decides tier

; Activation mode (input trigger path):
; 0 = Shout, 1 = Spell/Power, 2 = Hotkey
ActivationMode=2
; Activation visibility/use policy:
; 0 = selected mode only (remove/hide non-selected NADS activation forms)
; 1 = allow shout + spell + hotkey together
AllowMultipleActivationTypes=0
; Takeover mode:
; 0 = disabled (default NADS controller dash path)
; 1 = enabled (hotkey-only input, provider event route, no NADS controller movement)
TakeoverEnabled=0
; Takeover provider:
; 0 = TK Dodge
; 1 = DMCO
TakeoverProvider=0
; Allow takeover dodge while weapons/spells are sheathed.
; 0 = require drawn, 1 = allow sheathed
TakeoverAllowSheathed=0
; TK takeover style:
; 0 = TK Default (Full Roll)
; 1 = Step and Forward Roll
; 2 = Full Step
TakeoverStyle=0
; DMCO takeover style:
; 0 = Set 1 (MCO_Dodge-*-1.hkx)
; 1 = Set 2 (MCO_Dodge-*-2.hkx)
DmcoTakeoverStyle=0
; Hotkey mode settings:
; HotkeyStaminaCost: stamina spent per successful hotkey dodge.
HotkeyStaminaCost=20
; HotkeyTier is used by MCM hotkey tap trigger
; HotkeyCode uses DirectInput-style key codes, -1 = unbound
; HotkeyTapMaxMs: dodge fires on key release only when held <= this window.
; Holding longer passes the key release through to vanilla handlers.
; If takeover dodge is already active when this hotkey is pressed/released,
; one extra takeover dodge is queued and will fire after the current takeover
; dodge has fully ended in the provider graph.
; Additional mid-dodge queue attempts are ignored until the queued follow-up is used.
HotkeyTier=1
HotkeyCode=-1
HotkeyTapMaxMs=200
; Spell mode magicka costs per tier.
SpellMagickaCost1=20
SpellMagickaCost2=25
SpellMagickaCost3=30
; Shout mode per-tier cooldown override.
ShoutCooldown1=3
ShoutCooldown2=4
ShoutCooldown3=5

; Temporary dodge invulnerability (script-driven ghost window while dash gate is active)
; 0 = disabled, 1 = enabled
DodgeIFramesEnabled=1

; Effective duration is:
; max(DashTimeN, DistN / DashMaxSpeed)
; Lower speed cap increases visible travel time for longer tiers.
DashMaxSpeed=580.0

; Hard distance clamp.
MaxDistanceCap=2020.0

; Input threshold:
; <= 1.0 direct normalized threshold
; > 1.0 percentage (25 = 0.25)
InputThreshold=25.0

; moveInputVec Y sign:
; +1 => positive Y is forward
; -1 => negative Y is forward
InputYSign=1.0

; Shout mode only: retain move direction for this many milliseconds after shout press.
; Lower values reduce stale-direction carryover between rapid direction changes.
InputLatchWindowMs=250

; Optional animation support hooks.
; 0 = disabled, 1 = enabled
AnimHooksEnabled=0
; Optional graph events (leave blank to skip)
AnimStartEvent=
AnimStopEvent=
; Optional graph variables (leave blank to skip)
AnimStateVar=bDodgeBlinking
AnimTierVar=iDodgeBlinkTier

; Third-person animation framework hooks.
; Intended for animation packs layered onto this mod.
TPAnimFrameworkEnabled=0
; 1 = only run TP animation hooks when camera is not first-person
TPAnimThirdPersonOnly=1
; Optional directional events sent at dash start.
; Leave blank for default Nemesis path (no custom behavior patch needed).
TPAnimForwardEvent=
TPAnimBackwardEvent=
TPAnimLeftEvent=
TPAnimRightEvent=
; Optional stop event at dash end
TPAnimStopEvent=
; Graph variables exposed for animation pack authors
TPAnimStateVar=bNADSDodging
TPAnimTierVar=iNADSDodgeTier
TPAnimDirectionVar=iNADSDodgeDirection
; Signed local dodge angle in degrees (-180..180).
; 0=forward, +90=right, -90=left, +/-180=backward.
; Preferred for 8-way or blend-based animation conditions.
TPAnimAngleVar=fNADSDodgeAngle
TPAnimSpeedVar=fNADSDodgeSpeed
TPAnimSpeedScale=1.0

; Third-person travel shaping (first-person is unchanged).
; 0 = keep TP movement matching first-person timing by default.
TPTravelProfileEnabled=0
; EffectiveTPDuration = max(DashTimeN * TPDurationScale, TPMinDuration)
TPDurationScale=1.0
TPMinDuration=0.30
; Additional per-tier TP duration floors (animation-led pacing).
TPTierDuration1=0.30
TPTierDuration2=0.38
TPTierDuration3=0.46
; Extra TP recovery window to complete movement if animation state suppresses frames.
TPRecoveryExtraSeconds=0.00
; TP closed-loop glide tuning:
; lower catchup strength / step cap reduces perceived teleport snaps.
TPCatchupStrength=0.45
TPCatchupStepScaleMax=1.35
TPRecoverySpeedScale=0.75
; Third-person cast startup:
; 1 = suppress/cancel vanilla shout cast animation at dash start
; 0 = keep vanilla shout animation flow
TPSuppressVanillaShoutAnim=1
; Graph event sent when suppression is enabled (third-person only)
TPSuppressVanillaShoutEvent=IdleForceDefaultState
; 1 = intercept NADS shout input in third-person and force immediate tier-1 dodge.
;     This bypasses vanilla hold-to-word behavior for that press.
; 0 = use vanilla shout input flow so hold duration determines tier.
TPImmediateShoutTriggerEnabled=0
; Optional disappear/reappear visual borrowed from vanilla invisibility behavior.
; 1 = enable fade-out/fade-in during dodge, 0 = disable.
DashInvisibilityFxEnabled=1
; 1 = only apply when not in first-person camera.
DashInvisibilityFxThirdPersonOnly=1
; Fade timing in seconds relative to dash duration.
DashInvisibilityFadeOutSeconds=0.06
DashInvisibilityFadeInSeconds=0.12
; Refraction strength while invisible (0..1).
DashInvisibilityRefraction=0.35
; Final duration is also constrained by speed cap:
; max(EffectiveTPDuration, DistN / TPMaxSpeed)
TPMaxSpeed=580.0
